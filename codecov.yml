coverage:
  precision: 1
  round: down
  range: "60...90"
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: 70%
        threshold: 5%
        informational: true

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false

ignore:
  - "cmd/**"
  - "internal/windows/**"
  - "default_rom/**"
  - "docs/**"
  - "**/*_test.go"
