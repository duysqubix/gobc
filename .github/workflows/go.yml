name: Gobc

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go 1.26
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev xorg-dev

    - name: Run unit tests with coverage
      run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

    - name: Coverage summary
      run: go tool cover -func=coverage.out | tail -20

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.out
        fail_ci_if_error: false
        verbose: false

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.out
        retention-days: 14

  integration-rom-tests:
    name: ROM Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go 1.26
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev xorg-dev

    - name: Build GoBC binary
      run: go build -v -o gobc ./cmd/gobc

    - name: Test Blargg cpu_instrs
      run: |
        set -e
        output=$(./gobc --no-gui default_rom/blarrg/cpu_instrs/cpu_instrs.gb)
        echo "$output" | grep 'Passed'
        echo "$output"

    - name: Test Blargg instr_timing
      run: |
        set -e
        output=$(./gobc --no-gui default_rom/blarrg/instr_timing/instr_timing.gb)
        echo "$output" | grep 'Passed'
        echo "$output"

    - name: Test Blargg halt_bug (cart-RAM signature)
      run: |
        set -e
        bin="$PWD/gobc"
        work=$(mktemp -d)
        trap 'rm -rf "$work"' EXIT
        cp default_rom/blarrg/halt_bug/halt_bug.gb "$work/halt_bug.gb"
        ( cd "$work" && timeout 30 "$bin" --no-gui halt_bug.gb >/dev/null 2>&1 ) || true
        sav="$work/halt_bug.sav"
        sig=$(xxd -s 1 -l 3 -p "$sav")
        code=$(xxd -s 0 -l 1 -p "$sav")
        if [[ "$sig" != "deb061" ]]; then echo "FAIL: halt_bug missing signature"; exit 1; fi
        if [[ "$code" != "00" ]]; then echo "FAIL: halt_bug code=0x$code"; exit 1; fi
        echo "PASS: halt_bug"

    - name: Test Blargg cgb_sound (all 12)
      run: |
        set -e
        passing=(
          "01-registers"
          "02-len ctr"
          "03-trigger"
          "04-sweep"
          "05-sweep details"
          "06-overflow on trigger"
          "07-len sweep period sync"
          "08-len ctr during power"
          "09-wave read while on"
          "10-wave trigger while on"
          "11-regs after power"
          "12-wave"
        )
        bin="$PWD/gobc"
        work=$(mktemp -d)
        trap 'rm -rf "$work"' EXIT
        fail=0
        for name in "${passing[@]}"; do
          cp "default_rom/blarrg/cgb_sound/rom_singles/${name}.gb" "$work/${name}.gb"
          ( cd "$work" && timeout 60 "$bin" --no-gui "${name}.gb" >/dev/null 2>&1 ) || true
          sav="$work/${name}.sav"
          if [[ ! -f "$sav" ]]; then
            echo "FAIL: $name — no .sav file produced"
            fail=1; continue
          fi
          sig=$(xxd -s 1 -l 3 -p "$sav")
          code=$(xxd -s 0 -l 1 -p "$sav")
          if [[ "$sig" != "deb061" ]]; then
            echo "FAIL: $name — missing Blargg signature (got $sig)"
            fail=1; continue
          fi
          if [[ "$code" != "00" ]]; then
            echo "FAIL: $name — result code 0x$code (expected 0x00)"
            fail=1; continue
          fi
          echo "PASS: $name"
        done
        exit "$fail"

    - name: Test Blargg dmg_sound (all 12)
      run: |
        set -e
        # The dmg_sound suite writes results to cart RAM at $A000 (not serial);
        # gobc saves cart RAM to <rom>.sav on shutdown. Signature at $A001-$A003
        # is "DE B0 61"; $A000 = 0x00 means pass. See docs/audio_tests.md for the
        # full 12-ROM matrix.
        passing=(
          "01-registers"
          "02-len ctr"
          "03-trigger"
          "04-sweep"
          "05-sweep details"
          "06-overflow on trigger"
          "07-len sweep period sync"
          "08-len ctr during power"
          "09-wave read while on"
          "10-wave trigger while on"
          "11-regs after power"
          "12-wave write while on"
        )
        bin="$PWD/gobc"
        work=$(mktemp -d)
        trap 'rm -rf "$work"' EXIT
        fail=0
        for name in "${passing[@]}"; do
          cp "default_rom/blarrg/dmg_sound/rom_singles/${name}.gb" "$work/${name}.gb"
          ( cd "$work" && timeout 60 "$bin" --no-gui "${name}.gb" >/dev/null 2>&1 ) || true
          sav="$work/${name}.sav"
          if [[ ! -f "$sav" ]]; then
            echo "FAIL: $name — no .sav file produced"
            fail=1; continue
          fi
          sig=$(xxd -s 1 -l 3 -p "$sav")
          code=$(xxd -s 0 -l 1 -p "$sav")
          if [[ "$sig" != "deb061" ]]; then
            echo "FAIL: $name — missing Blargg signature (got $sig)"
            fail=1; continue
          fi
          if [[ "$code" != "00" ]]; then
            echo "FAIL: $name — result code 0x$code (expected 0x00)"
            fail=1; continue
          fi
          echo "PASS: $name"
        done
        exit "$fail"
