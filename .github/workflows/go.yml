name: Gobc

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go 1.26
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev xorg-dev

    - name: Run unit tests with coverage
      run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

    - name: Coverage summary
      run: go tool cover -func=coverage.out | tail -20

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.out
        fail_ci_if_error: false
        verbose: false

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.out
        retention-days: 14

  integration-rom-tests:
    name: ROM Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go 1.26
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev xorg-dev

    - name: Build GoBC binary
      run: go build -v -o gobc ./cmd/gobc

    - name: Test Blargg cpu_instrs
      run: |
        set -e
        output=$(./gobc --no-gui default_rom/blarrg/cpu_instrs/cpu_instrs.gb)
        echo "$output" | grep 'Passed'
        echo "$output"

    - name: Test Blargg instr_timing
      run: |
        set -e
        output=$(./gobc --no-gui default_rom/blarrg/instr_timing/instr_timing.gb)
        echo "$output" | grep 'Passed'
        echo "$output"
